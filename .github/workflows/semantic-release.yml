name: Semantic Release

on:
  workflow_call:
    inputs:
      node-version: { description: "Node.js version", default: "24", required: false, type: string }
      dry_run: { description: "Compute the version but do NOT create a release or tag", default: false, required: false, type: boolean }
    outputs:
      version:
        description: "Version created by semantic-release"
        value: ${{ jobs.semantic-release.outputs.version }}

defaults:
  run:
    shell: bash

jobs:
  semantic-release:
    name: Semantic Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      packages: write
    outputs:
      version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Enable Corepack (Yarn Berry)
        run: corepack enable
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          cache: yarn
      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v6
        with:
          dry_run: ${{ inputs.dry_run }}
          semantic_version: 25
          extra_plugins: |
            @semantic-release/commit-analyzer@13
            @semantic-release/release-notes-generator@14
            @semantic-release/changelog@6
            @semantic-release/git@10
            @semantic-release/github@12
            conventional-changelog-conventionalcommits@9
          branches: |
            [
              '+([0-9])?(.{+([0-9]),x}).x',
              'main', 'next', 'next-major',
              { name: 'beta',  prerelease: true },
              { name: 'alpha', prerelease: true }
            ]
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          HUSKY: 0
